name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Cross-platform baseline: the default-feature (no_std + alloc) build and the
  # default test suite on all three OSes. No system libraries: everything here is
  # pure Rust, so it is the safety net that must stay green everywhere.
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: check (no_std default build)
        run: cargo check --workspace --locked
      - name: test (default features)
        run: cargo test --workspace --locked

  # Lints, default features, Linux. Not run with `-D warnings`: the workspace is
  # hand-formatted and carries some intentional warnings, so CI fails only on
  # clippy errors, not warnings. (No `cargo fmt --check`: the repo is deliberately
  # not rustfmt-clean, see feedback in AGENTS.md / project memory.)
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked

  # Linux platform / feature build. Compiles the OS-coupled and GPU/ML elements
  # that build with stable, apt-installable system libraries. Intentionally
  # omitted (need version-pinned or proprietary deps, add separately):
  #   ffmpeg (libav* version-sensitive), vaapi (libva + GBM + bindgen),
  #   pipewire (libpipewire version-sensitive), vpx (env-libvpx-sys ships
  #   bindings only for specific libvpx versions, needs its `generate` feature +
  #   clang against the system libvpx), cuda / cuda-gl (NVIDIA driver),
  #   ort (downloads ONNX Runtime binaries at build).
  features-linux:
    name: features (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev libasound2-dev libpulse-dev \
            libopus-dev libwayland-dev libxkbcommon-dev
      - name: check g2g-plugins (linux feature set)
        run: >
          cargo check -p g2g-plugins --locked --all-targets --features
          rtsp,onvif,udp-egress,udp-ingress,rtmp,http-src,hls,dash,av1-encode,mjpeg,mjpeg-encode,opus,alsa-sink,pulse-sink,wayland-sink,kms-sink,v4l2,analytics,vello-overlay,wgpu-sink,plugin-loader
      - name: check g2g-ml (wgpu + burn)
        run: cargo check -p g2g-ml --locked --all-targets --features wgpu,burn
      # Embedded / no_std path: the embassy-sync stack channel, the no-alloc
      # StaticLendRing DMA capture ring, and a 3-task pipeline on a real Embassy
      # executor (platform-std, run_until) all run on the host without a HAL time
      # driver, so CI guards the embedded story (M45 / M260 / M264).
      - name: test g2g-plugins (embassy-link, no-alloc embedded path)
        run: cargo test -p g2g-plugins --locked --features embassy-link --test m45_embassy_link --test m260_dma_ring --test m264_embassy_multitask
      # ONVIF SOAP/WS-Discovery is hand-rolled, so guard the deterministic
      # parts (envelope build, password digest, response parsing) in CI. The
      # live discovery / resolve tests are #[ignore] (need a camera on the LAN).
      - name: test g2g-plugins (onvif, offline)
        run: cargo test -p g2g-plugins --locked --features onvif --lib onvif --test onvif_smoke

  # Windows platform build: Media Foundation decode/encode/AAC, WASAPI audio,
  # Direct3D11 present, MF camera. The `windows` crate bundles its bindings, so no
  # system-library install is needed.
  features-windows:
    name: features (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: check g2g-plugins (windows feature set)
        run: >
          cargo check -p g2g-plugins --locked --all-targets --features
          mf-decode,mf-encode,mf-aac,wasapi-sink,wasapi-src,d3d11-sink,mf-video-src

  # macOS platform build: VideoToolbox H.264 decode (VtDecode) plus the wgpu/burn
  # ML path on the Metal backend. The objc2 crates link the system frameworks
  # present on the runner, so no install is needed. This is the job that actually
  # compiles the VtDecode VideoToolbox FFI (the dev host is Linux and cannot).
  features-macos:
    name: features (macos)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: check g2g-plugins (vtdecode + vtencode)
        run: cargo check -p g2g-plugins --locked --all-targets --features vtdecode,vtencode
      - name: check g2g-ml (wgpu + burn, Metal)
        run: cargo check -p g2g-ml --locked --all-targets --features wgpu,burn

  # Android platform build. There is no native Android runner, so this is a
  # cross-compile check (aarch64-linux-android): it compiles the NDK MediaCodec
  # element (the same compiler feedback the macOS job gives VtDecode). ndk-sys
  # ships pregenerated bindings, so `cargo check` needs only the rustup target,
  # not a full NDK install (linking / running on a device is validated
  # separately). Mirrors the macOS decode track for Android.
  features-android:
    name: features (android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
      - name: check g2g-plugins (mediacodec)
        run: >
          cargo check -p g2g-plugins --locked --all-targets
          --target aarch64-linux-android --features mediacodec
      # M304: the MediaCodec -> wgpu/Vulkan zero-copy bridge (pulls wgpu + the raw
      # Vulkan escape hatch). Cross-check the bridge module and the on-device
      # probe test; running it is validated on a device separately.
      - name: check g2g-plugins (mediacodec-wgpu)
        run: >
          cargo check -p g2g-plugins --locked --all-targets
          --target aarch64-linux-android --features mediacodec-wgpu
      # M304: WgpuPreprocess consumes the RGBA WgpuTexture MediaCodecDec emits
      # (the decode -> preprocess loop on GPU). Cross-check the consume path + the
      # on-device chain test; running it is validated on a device separately.
      - name: check g2g-ml (mediacodec-wgpu)
        run: >
          cargo check -p g2g-ml --locked --all-targets
          --target aarch64-linux-android --features mediacodec-wgpu
      # M306/M307/M308: MediaCodec encode + AAudio + Camera2 capture. Cross-check
      # each element and its on-device probe; running them is validated on a device
      # separately. Encode rides the `mediacodec` feature above; build the audio /
      # camera features here.
      - name: check g2g-plugins (aaudio)
        run: >
          cargo check -p g2g-plugins --locked --all-targets
          --target aarch64-linux-android --features aaudio
      - name: check g2g-plugins (camera2)
        run: >
          cargo check -p g2g-plugins --locked --all-targets
          --target aarch64-linux-android --features camera2

  # The no_std + wasm pillar: the core builds for the browser target. (A bare-
  # metal target like thumbv7em needs the critical-section feature + a CS impl, so
  # it is left to a dedicated embedded job.)
  wasm:
    name: wasm (g2g-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      # `runtime` pulls `spin` (the core's no-feature build can't compile log.rs
      # without it); it builds on wasm32. Verified locally for the target.
      - run: cargo check -p g2g-core --locked --target wasm32-unknown-unknown --features runtime
