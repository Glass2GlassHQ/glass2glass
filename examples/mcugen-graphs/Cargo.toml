# M646/M648 proof: the flagship audio and display graphs GENERATED by
# g2g-mcugen (from g2g-mcugen/examples/flagship.yaml and display.yaml), each
# driven with the same peripherals as the hand-written reference. Host tests
# assert each generated pipeline's wire output matches the reference checksum
# byte-for-byte, so the compiler is proven to reproduce the hand-verified
# graphs, not merely to emit plausible-looking Rust. This covers both catalogs
# (audio: capture->convert->resample->mix->encode->RTP; video: camera->SPI
# display), so "g2g-mcugen is a general MCU graph compiler" is checked, not
# claimed. Standalone (own Cargo.lock, g2g-core with no `alloc`), like the
# other heap-free proof crates.
[package]
name = "mcugen-graphs"
version = "0.1.0"
edition = "2021"
publish = false

[workspace]

[lib]
# The generated graphs are heap-free; the crate is `no_std` to prove they build
# in the no-alloc dependency config (the host equivalence tests are separate).
path = "src/lib.rs"

[dependencies]
g2g-core = { path = "../../g2g-core", default-features = false }
g2g-mcu = { path = "../../g2g-mcu" }
# The mock peripherals + reference checksums the proofs compare to: audio
# capture in `noalloc-pipeline::audio`, the display stub bus in its crate root.
noalloc-pipeline = { path = "../noalloc-pipeline" }
# The generated display pipeline's seams are bound on `embedded-hal` traits (the
# SPI bus, D/C pin, and delay), so the crate needs the trait definitions.
embedded-hal = "1"
