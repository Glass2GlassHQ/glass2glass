# The pipeline keeps all state in locals (0 bytes static RAM): its worst-case
# stack is ~1.5 KB (tools/footprint-report.sh), so 8 KB on the main thread
# leaves generous margin for Zephyr's own context + printk.
# The flagship audio graph's worst-case stack is ~6.5 KB (footprint-report),
# on top of Zephyr's own main-thread overhead.
CONFIG_MAIN_STACK_SIZE=16384
