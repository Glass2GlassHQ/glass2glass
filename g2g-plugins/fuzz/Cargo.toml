[package]
name = "g2g-plugins-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

# standalone: detach from the parent glass2glass workspace
[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"

[dependencies.g2g-plugins]
path = ".."
default-features = false
# std pulls in the mp4demuxn box parser; rtmp pulls the handshake module; the
# other targets are no_std modules
features = ["std", "rtmp"]

# for the parse_launch target: the launch-string parser lives in g2g-core's
# runtime layer (the untrusted-text surface the g2g-capi C ABI forwards).
[dependencies.g2g-core]
path = "../../g2g-core"
features = ["std", "runtime"]

[profile.release]
debug = 1

[[bin]]
name = "mp4_streams"
path = "fuzz_targets/mp4_streams.rs"
test = false
doc = false
bench = false

